name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Write CLASP credentials
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: printf '%s' "$CLASPRC_JSON" | tr -d '\000-\037' > ~/.clasprc.json

      - name: Refresh access token
        run: |
          node -e "
            const https = require('https');
            const fs = require('fs');
            const rcPath = process.env.HOME + '/.clasprc.json';
            const rc = JSON.parse(fs.readFileSync(rcPath, 'utf8'));
            const t = rc.tokens && rc.tokens.default ? rc.tokens.default : rc.token;
            const clientId = t.client_id || rc.oauth2ClientSettings.clientId;
            const clientSecret = t.client_secret || rc.oauth2ClientSettings.clientSecret;
            const body = 'client_id=' + encodeURIComponent(clientId)
              + '&client_secret=' + encodeURIComponent(clientSecret)
              + '&refresh_token=' + encodeURIComponent(t.refresh_token)
              + '&grant_type=refresh_token';
            const req = https.request({
              hostname: 'oauth2.googleapis.com', path: '/token', method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Content-Length': Buffer.byteLength(body) }
            }, res => {
              let d = '';
              res.on('data', c => d += c);
              res.on('end', () => {
                const r = JSON.parse(d);
                if (r.error) { console.error('OAuth error:', r.error, r.error_description); process.exit(1); }
                t.access_token = r.access_token;
                t.expiry_date = Date.now() + r.expires_in * 1000;
                if (r.refresh_token) t.refresh_token = r.refresh_token;
                fs.writeFileSync(rcPath, JSON.stringify(rc));
                console.log('Token refreshed, expires:', new Date(t.expiry_date).toISOString());
              });
            });
            req.on('error', e => { console.error('Network error:', e.message); process.exit(1); });
            req.write(body); req.end();
          "

      - name: Push to Google Apps Script
        run: node scripts/push.js
